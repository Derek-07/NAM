<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    /* Chatbot Button */
    #chatbot-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1000;
      font-size: 20px;
    }

    /* Chat Window */
    #chatbot-window {
      position: fixed;
      bottom: 70px;
      right: 20px;
      width: 300px;
      height: 400px;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 999;
    }

    #chatbot-header {
      background-color: #007bff;
      color: white;
      padding: 10px;
      font-weight: bold;
    }

    #chatbot-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }

    .message {
      margin: 5px 0;
    }

    .user { text-align: right; color: blue; }
    .bot { text-align: left; color: green; }

    #chatbot-input {
      display: flex;
      border-top: 1px solid #ccc;
    }

    #chatbot-input input {
      flex: 1;
      padding: 8px;
      border: none;
    }

    #chatbot-input button {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }

 .parent {
  min-height: 53vh; /* set height as you need */
}

.child {
  margin-top: auto;
  background: green;
}
  </style>
</head>
<body>

<!-- Chatbot Button -->
<button id="chatbot-button">💬</button>

<!-- Chatbot Window -->
<div id="chatbot-window">
  <div id="chatbot-header">AI Chatbot</div>
  <div id="chatbot-messages" class="parent"></div>
  <div id="chatbot-input" class= "child">
    <input type="text" id="user-input" placeholder="Type a message...">
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  // Toggle chatbot window
  $('#chatbot-button').click(function () {
    $('#chatbot-window').toggle();
  });

  // Predefined bot responses
  function getBotResponse(input) {
    input = input.toLowerCase();
    if (input.includes("hello") || input.includes("hi")) return "Hello! How can I help you today?";
    if (input.includes("course") || input.includes("bca")) return "We offer BCA, MBA, BBA, and more. Visit the Courses section on our site.";
    if (input.includes("admission")) return "You can apply online through our Admission tab or contact us at +91-7088019933.";
    if (input.includes("location")) return "We are located at NH-72, Jhajra, Chakrata Road, Dehradun.";
    return "I'm not sure about that. Please contact our support or check the website.";
  }

  // Send message
  $('#send-btn').click(function () {
    const userInput = $('#user-input').val();
    if (userInput.trim() === "") return;

    $('#chatbot-messages').append(`<div class="message user">${userInput}</div>`);
    const botResponse = getBotResponse(userInput);
    setTimeout(() => {
      $('#chatbot-messages').append(`<div class="message bot">${botResponse}</div>`);
      $('#chatbot-messages').scrollTop($('#chatbot-messages')[0].scrollHeight);
    }, 500);

    $('#user-input').val('');
  });

  // Press Enter to send
  $('#user-input').keypress(function (e) {
    if (e.which == 13) $('#send-btn').click();
  });
</script>

</body>
</html>

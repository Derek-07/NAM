<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="contactus.css" rel="stylesheets">
</head>
<body>
    <div class="container">
        <hi>Connect With Us</hi>
        <p>We would love to respond to your queries and help you succeed. Feel free to get in touch with us.</p>
        <div class="contact-box">
            <div class="contact-left">
                <h3>Sent your request</h3>
                <form>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Name</label>
                            <input type="text" placeholder="Shashank Singh">
                    </div>
                </form>
            </div>
            <div class="contact-right"></div>
            <h3>Reach Us</h3>
        </div>
    </div>
    
</body>
</html>
